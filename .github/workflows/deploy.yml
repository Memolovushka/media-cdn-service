name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      BETTER_AUTH_SECRET: local-build-only-secret-for-opennext-1234567890
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Cloudflare worker
        run: bun run cf:build

      - name: Apply D1 migrations
        run: bunx wrangler d1 migrations apply base --remote --config wrangler.jsonc

      - name: Deploy worker
        run: bunx wrangler deploy --config wrangler.jsonc
